<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4A → MP3 · Jay Wang</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&display=swap');

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e10;
  --surface: #18181c;
  --surface2: #222228;
  --border: #2e2e38;
  --accent: #c8f041;
  --accent-dim: rgba(200,240,65,.12);
  --text: #f0f0ee;
  --muted: #7a7a8a;
  --danger: #ff5f5f;
  --mono: 'DM Mono', monospace;
  --display: 'Syne', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem 5rem;
}

/* ── Header ── */
header {
  text-align: center;
  margin-bottom: 3rem;
}

.logo {
  font-family: var(--display);
  font-weight: 800;
  font-size: 2.8rem;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: .6rem;
}
.logo .arrow { color: var(--accent); }

.tagline {
  font-size: .78rem;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 1.8rem;
}

.fun-badges {
  display: flex;
  gap: .5rem;
  justify-content: center;
  flex-wrap: wrap;
}
.badge {
  font-size: .65rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: .25rem .75rem;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--surface);
}
.badge.green { color: var(--accent); border-color: rgba(200,240,65,.3); background: var(--accent-dim); }

/* ── Container ── */
.container {
  width: 100%;
  max-width: 660px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── Loading overlay ── */
.loader-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  padding: 2.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.loader-wrap.visible { display: flex; }

.spinner {
  width: 36px; height: 36px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-size: .8rem;
  color: var(--muted);
  text-align: center;
}
.loader-text strong { color: var(--accent); font-weight: 500; }

/* ── Drop zone ── */
.drop-zone {
  border: 1.5px dashed var(--border);
  border-radius: 16px;
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}
.drop-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,240,65,.06), transparent);
  pointer-events: none;
}
.drop-zone:hover,
.drop-zone.drag-over { border-color: var(--accent); background: #141710; }

.drop-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.4rem;
  font-size: 1.6rem;
}

.drop-zone h2 {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1.1rem;
  margin-bottom: .5rem;
}

.drop-zone p {
  font-size: .78rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

.btn-browse {
  display: inline-block;
  background: var(--accent);
  color: #0e0e10;
  font-family: var(--mono);
  font-size: .78rem;
  font-weight: 500;
  padding: .55rem 1.4rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  letter-spacing: .06em;
  transition: opacity .2s;
}
.btn-browse:hover { opacity: .85; }
#file-input { display: none; }

/* ── Info strip ── */
.info-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .6rem;
}
.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  text-align: center;
}
.info-card .num {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1.4rem;
  color: var(--accent);
  line-height: 1;
  margin-bottom: .3rem;
}
.info-card .lbl {
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* ── File list ── */
.file-list { display: flex; flex-direction: column; gap: .6rem; }

.file-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: .9rem 1rem;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  gap: .35rem .75rem;
  align-items: center;
  transition: border-color .2s;
}
.file-item.done  { border-color: var(--accent); }
.file-item.error { border-color: var(--danger); }

.file-name { font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-size { font-size: .7rem; color: var(--muted); }
.file-status { font-size: .72rem; text-align: right; white-space: nowrap; }
.file-status.waiting    { color: var(--muted); }
.file-status.loading    { color: var(--accent); }
.file-status.converting { color: var(--accent); }
.file-status.done       { color: var(--accent); }
.file-status.error      { color: var(--danger); }

.progress-wrap {
  grid-column: 1 / -1;
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  width: 0%;
  transition: width .35s;
}

.download-btn {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--accent);
  background: none;
  border: 1px solid rgba(200,240,65,.4);
  border-radius: 6px;
  padding: .25rem .75rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background .2s, color .2s;
}
.download-btn:hover { background: var(--accent); color: #0e0e10; }

/* ── Actions ── */
.actions { display: flex; gap: .75rem; align-items: center; }

.btn-convert {
  flex: 1;
  background: var(--accent);
  color: #0e0e10;
  font-family: var(--mono);
  font-size: .85rem;
  font-weight: 500;
  padding: .85rem 1.5rem;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  letter-spacing: .06em;
  transition: opacity .2s;
}
.btn-convert:hover { opacity: .85; }
.btn-convert:disabled { opacity: .35; cursor: not-allowed; }

.btn-clear {
  background: var(--surface);
  color: var(--muted);
  font-family: var(--mono);
  font-size: .78rem;
  padding: .85rem 1.1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
.btn-clear:hover { color: var(--text); border-color: var(--text); }

/* ── Status bar ── */
.status-bar {
  font-size: .72rem;
  color: var(--muted);
  text-align: center;
  padding: .4rem;
  min-height: 1.4rem;
  font-style: italic;
}
.status-bar.active { color: var(--accent); font-style: normal; }

/* ── Fun fact ticker ── */
.fact-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: flex-start;
  gap: .75rem;
}
.fact-icon { font-size: 1rem; flex-shrink: 0; margin-top: .05rem; }
.fact-text { font-size: .75rem; color: var(--muted); line-height: 1.6; }
.fact-text strong { color: var(--text); font-weight: 500; }

/* ── Footer ── */
footer {
  margin-top: 3.5rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.footer-name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: -.01em;
}
.footer-name span { color: var(--accent); }
.footer-sub {
  font-size: .68rem;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .info-strip { grid-template-columns: repeat(3, 1fr); }
  .logo { font-size: 2rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo">M4A <span class="arrow">→</span> MP3</div>
  <p class="tagline">浏览器本地转换 · 零上传 · 零服务器</p>
  <div class="fun-badges">
    <span class="badge green">100% 本地运行</span>
    <span class="badge">文件不离开你的电脑</span>
    <span class="badge">支持批量</span>
  </div>
</header>

<div class="container">

  <!-- ffmpeg 加载状态 -->
  <div class="loader-wrap" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">
      正在加载 <strong>ffmpeg.wasm</strong>（首次约需 10 秒）<br>
      <span style="font-size:.68rem;margin-top:.3rem;display:block">加载完成后就可以开始转换，之后无需重新加载</span>
    </div>
  </div>

  <!-- 拖拽区域 -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">🎵</div>
    <h2>把 M4A 文件拖到这里</h2>
    <p>
      转换在你的浏览器里完成<br>
      文件全程不会离开你的电脑，放心用
    </p>
    <button class="btn-browse" id="btn-browse">选择文件</button>
    <input type="file" id="file-input" accept=".m4a" multiple>
  </div>

  <!-- 统计小卡片 -->
  <div class="info-strip" id="stats" style="display:none">
    <div class="info-card">
      <div class="num" id="stat-total">0</div>
      <div class="lbl">已添加</div>
    </div>
    <div class="info-card">
      <div class="num" id="stat-done">0</div>
      <div class="lbl">已完成</div>
    </div>
    <div class="info-card">
      <div class="num" id="stat-size">0</div>
      <div class="lbl">MB 待处理</div>
    </div>
  </div>

  <!-- 文件列表 -->
  <div class="file-list" id="file-list"></div>

  <!-- 操作按钮 -->
  <div class="actions" id="actions" style="display:none">
    <button class="btn-convert" id="btn-convert" disabled>开始转换</button>
    <button class="btn-clear" id="btn-clear">清空</button>
  </div>

  <!-- 状态 -->
  <div class="status-bar" id="status-bar"></div>

  <!-- 趣味说明 -->
  <div class="fact-box" id="fact-box">
    <div class="fact-icon">💡</div>
    <div class="fact-text" id="fact-text"></div>
  </div>

</div>

<!-- Footer -->
<footer>
  <div class="footer-name">Jay <span>Wang</span></div>
  <div class="footer-sub">Built with ffmpeg.wasm · 纯前端 · 开源可自部署</div>
</footer>

<script type="module">
import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js';
import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

// ── 趣味说明轮播 ──
const FACTS = [
  '<strong>M4A vs MP3</strong>：M4A 是苹果的容器格式（AAC 编码），MP3 则是最通用的音频格式，几乎所有设备都能播放。',
  '<strong>音质说明</strong>：本工具使用 VBR 质量等级 2，相当于平均 ~190kbps，听感和原文件几乎没有区别。',
  '<strong>为什么要转换？</strong> 很多播放器、车载设备、老设备不支持 M4A，转成 MP3 兼容性最好。',
  '<strong>隐私优先</strong>：所有转换在浏览器内完成，文件从不上传到任何服务器，Jay 也看不到你的文件 👀',
  '<strong>ffmpeg.wasm</strong>：这个工具背后是把 ffmpeg 编译成了 WebAssembly，让浏览器也能跑专业音视频处理。',
  '<strong>批量转换</strong>：一次可以拖入多个文件，它们会按顺序依次转换，完成后逐个下载。',
];

let factIdx = 0;
const factEl = document.getElementById('fact-text');
function showFact() {
  factEl.style.opacity = 0;
  setTimeout(() => {
    factEl.innerHTML = FACTS[factIdx % FACTS.length];
    factEl.style.opacity = 1;
    factIdx++;
  }, 300);
}
factEl.style.transition = 'opacity .3s';
showFact();
setInterval(showFact, 6000);

// ── ffmpeg 初始化 ──
const ffmpeg = new FFmpeg();
let ready = false;

const loader = document.getElementById('loader');
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const stats = document.getElementById('stats');
const actions = document.getElementById('actions');
const btnConvert = document.getElementById('btn-convert');
const btnClear = document.getElementById('btn-clear');
const btnBrowse = document.getElementById('btn-browse');
const statusBar = document.getElementById('status-bar');

async function loadFFmpeg() {
  loader.classList.add('visible');
  dropZone.style.opacity = '.5';
  dropZone.style.pointerEvents = 'none';
  try {
    const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.4/dist/esm';
    await ffmpeg.load({
      coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
    });
    ready = true;
  } catch(e) {
    statusBar.textContent = '加载 ffmpeg 失败，请刷新重试';
    statusBar.className = 'status-bar';
  }
  loader.classList.remove('visible');
  dropZone.style.opacity = '';
  dropZone.style.pointerEvents = '';
  updateUI();
}

loadFFmpeg();

// ── 文件管理 ──
let files = [];
let converting = false;

btnBrowse.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files]);
});

function addFiles(nf) {
  nf = nf.filter(f => f.name.toLowerCase().endsWith('.m4a'));
  nf.forEach(f => {
    if (!files.find(x => x.file.name === f.name && x.file.size === f.size))
      files.push({ file: f, status: 'waiting', progress: 0, url: null, error: null });
  });
  updateUI();
}

function updateStats() {
  document.getElementById('stat-total').textContent = files.length;
  document.getElementById('stat-done').textContent = files.filter(f => f.status === 'done').length;
  const mb = files.filter(f => f.status === 'waiting').reduce((s, f) => s + f.file.size, 0);
  document.getElementById('stat-size').textContent = (mb / 1024 / 1024).toFixed(1);
}

function updateUI() {
  // file list
  fileList.innerHTML = '';
  files.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'file-item' + (item.status === 'done' ? ' done' : item.status === 'error' ? ' error' : '');
    const sz = (item.file.size / 1024 / 1024).toFixed(1) + ' MB';
    const labels = { waiting: '等待中', loading: '读取中…', converting: '转换中…', done: '✓ 完成', error: '✗ 失败' };
    d.innerHTML = `
      <div class="file-name">${item.file.name}</div>
      <div class="file-status ${item.status}">${labels[item.status]}</div>
      <div class="file-size">${sz}${item.error ? `<span style="color:var(--danger);margin-left:.5rem;font-size:.65rem">${item.error}</span>` : ''}</div>
      <div>${item.status === 'done' ? `<button class="download-btn" data-i="${i}">下载 MP3</button>` : ''}</div>
      ${item.status !== 'waiting' ? `<div class="progress-wrap"><div class="progress-bar" style="width:${item.progress}%"></div></div>` : ''}
    `;
    fileList.appendChild(d);
  });

  // download buttons
  fileList.querySelectorAll('.download-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = files[btn.dataset.i];
      if (item.url) {
        const a = document.createElement('a');
        a.href = item.url;
        a.download = item.file.name.replace(/\.m4a$/i, '.mp3');
        a.click();
      }
    });
  });

  stats.style.display = files.length ? 'grid' : 'none';
  actions.style.display = files.length ? 'flex' : 'none';
  btnConvert.disabled = !ready || converting || !files.some(f => f.status === 'waiting');
  updateStats();
}

// ── 转换 ──
btnConvert.addEventListener('click', async () => {
  if (!ready || converting) return;
  converting = true;
  updateUI();

  for (let i = 0; i < files.length; i++) {
    const item = files[i];
    if (item.status !== 'waiting') continue;

    item.status = 'loading'; item.progress = 5; updateUI();
    statusBar.textContent = `正在处理：${item.file.name}`;
    statusBar.className = 'status-bar active';

    try {
      const inputData = await fetchFile(item.file);
      item.status = 'converting'; item.progress = 20; updateUI();

      await ffmpeg.writeFile('input.m4a', inputData);
      item.progress = 35; updateUI();

      ffmpeg.on('progress', ({ progress }) => {
        item.progress = 35 + Math.round(progress * 55);
        updateUI();
      });

      await ffmpeg.exec(['-i', 'input.m4a', '-codec:a', 'libmp3lame', '-qscale:a', '2', '-map_metadata', '0', 'output.mp3']);

      const data = await ffmpeg.readFile('output.mp3');
      item.url = URL.createObjectURL(new Blob([data.buffer], { type: 'audio/mpeg' }));
      item.status = 'done'; item.progress = 100;

      await ffmpeg.deleteFile('input.m4a');
      await ffmpeg.deleteFile('output.mp3');
    } catch (e) {
      item.status = 'error';
      item.error = '转换失败';
      console.error(e);
    }
    updateUI();
  }

  converting = false;
  const doneCount = files.filter(f => f.status === 'done').length;
  statusBar.textContent = `全部完成！共转换 ${doneCount} 个文件`;
  statusBar.className = 'status-bar';
  updateUI();
});

btnClear.addEventListener('click', () => {
  files = [];
  fileInput.value = '';
  statusBar.textContent = '';
  updateUI();
});
</script>
</body>
</html>
